name: Telegram Time Fake Test (Fixed)

on:
  workflow_dispatch:

jobs:
  fake_time_job:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Send Initial Message (حجز الوقت)
        id: send_step
        run: |
          # إرسال الرسالة الأولى وحفظ الرد
          RESPONSE=$(curl -s -X POST "https://api.telegram.org/bot${{ secrets.Token }}/sendMessage" \
            -d "chat_id=${{ secrets.Id }}" \
            -d "text=انتظروا الأسئلة هنا غداً...")
          
          # استخراج الـ message_id بدقة
          MSG_ID=$(echo $RESPONSE | jq '.result.message_id')
          echo "MSG_ID=$MSG_ID" >> $GITHUB_ENV

      - name: 2. Wait for 2 Minutes
        run: |
          sleep 61

      - name: 3. Edit Message Content (التعديل الصحيح)
        run: |
          # هنا استبدلنا sendMessage بـ editMessageText للتعديل الحقيقي
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.Token }}/editMessageText" \
            -d "chat_id=${{ secrets.Id }}" \
            -d "message_id=${{ env.MSG_ID }}" \
            -d "text=أهلاً.. هذه هي الأسئلة المسربة الحقيقية!"
