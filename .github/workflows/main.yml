name: Telegram Time Travel Test

on:
  workflow_dispatch: # تشغيل يدوي بضغطة زر

jobs:
  time_travel_experiment:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Python Environment
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Telethon Library
        run: pip install telethon

      - name: Download Tiny Test Images
        run: |
          curl -s -o past_1.jpg "https://placehold.co/150x150/ff0000/ffffff.jpg?text=Past1"
          curl -s -o past_2.jpg "https://placehold.co/150x150/ff0000/ffffff.jpg?text=Past2"

      - name: Create and Run Time Travel Script
        env:
          TELEGRAM_API_ID: ${{ secrets.ID }}
          TELEGRAM_API_HASH: ${{ secrets.HASH }}
          TELEGRAM_SESSION: ${{ secrets.SESSION }}
        run: |
          cat << 'EOF' > time_travel_script.py
          import asyncio
          import os
          import datetime
          from telethon import TelegramClient
          from telethon.sessions import StringSession

          api_id = int(os.environ['TELEGRAM_API_ID'])
          api_hash = os.environ['TELEGRAM_API_HASH']
          session_string = os.environ['TELEGRAM_SESSION']
          chat_id = -1004457565242 # معرف مجموعتك

          async def main():
              client = TelegramClient(StringSession(session_string), api_id, api_hash)
              await client.connect()
              
              # حساب وقت الماضي: الوقت الحالي بالـ UTC ناقص ساعتين كاملتين!
              past_time = datetime.datetime.utcnow() - datetime.timedelta(hours=2)
              
              print(f"=== [1] محاولة خداع السيرفر بجدولة رسالة للماضي عند: {past_time} UTC ===")
              
              # إرسال الألبوم وتمرير تاريخ قديم بالسيرفر
              await client.send_file(
                  chat_id, 
                  ['past_1.jpg', 'past_2.jpg'], 
                  caption="محاولة اختراق الزمن: هل نزلت بوقت الماضي؟",
                  schedule=past_time
              )
              
              print("تم إرسال الطلب الزمني الملعوب إلى سيرفرات تليجرام!")
              await client.disconnect()

          if __name__ == '__main__':
              asyncio.run(main())
          EOF
          
          python time_travel_script.py
