name: Telegram UserBot MTProto Test (All-in-One)

on:
  workflow_dispatch: # تشغيل يدوي بضغطة زر واحدة

jobs:
  userbot_experiment:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Python Environment
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Telethon Library
        run: pip install telethon

      - name: Download Tiny Test Images
        run: |
          curl -s -o black_1.jpg "https://placehold.co/150x150/000000/000000.jpg"
          curl -s -o black_2.jpg "https://placehold.co/150x150/000000/000000.jpg"
          curl -s -o white_target.jpg "https://placehold.co/150x150/ffffff/ffffff.jpg"

      - name: Create and Run Integrated Python Script
        env:
          TELEGRAM_API_ID: ${{ secrets.API_ID }}     # تم التعديل للأحرف الكبيرة لتطابق الـ Secrets عندك
          TELEGRAM_API_HASH: ${{ secrets.API_HASH }} # تم التعديل للأحرف الكبيرة لتطابق الـ Secrets عندك
          TELEGRAM_SESSION: ${{ secrets.SESSION }}   # تم التعديل للأحرف الكبيرة لتطابق الـ Secrets عندك
        run: |
          cat << 'EOF' > userbot_script.py
          import asyncio
          import os
          from telethon import TelegramClient
          from telethon.sessions import StringSession
          from telethon.tl.types import InputMediaUploadedPhoto

          api_id = int(os.environ['TELEGRAM_API_ID'])
          api_hash = os.environ['TELEGRAM_API_HASH']
          session_string = os.environ['TELEGRAM_SESSION']
          chat_id = -1004457565242 # معرف مجموعتك المستهدفة

          async def main():
              client = TelegramClient(StringSession(session_string), api_id, api_hash)
              await client.connect()
              
              print("=== [1] إرسال الألبوم كـ يوزر لحجز التوقيت ===")
              messages = await client.send_file(
                  chat_id, 
                  ['black_1.jpg', 'black_2.jpg'], 
                  caption="تحدي الـ MTProto: جاري حجز الوقت..."
              )
              
              target_msg = messages[0]
              print(f"تم الإرسال. معرف الرسالة: {target_msg.id}")
              
              print("الانتظار لمدة دقيقتين (120 ثانية)...")
              await asyncio.sleep(120)
              
              print("=== [2] تنفيذ التعديل العميق بالألبوم ===")
              uploaded_photo = await client.upload_file('white_target.jpg')
              
              await client.edit_message(
                  chat_id,
                  target_msg.id,
                  file=InputMediaUploadedPhoto(file=uploaded_photo),
                  text="تم التعديل عبر الـ User API! هل اختفت كلمة معدلة الآن؟"
              )
              print("اكتملت العملية الشاملة!")
              await client.disconnect()

          if __name__ == '__main__':
              asyncio.run(main())
          EOF
          
          python userbot_script.py
