name: Telegram Stickers & Emojis Ultimate Test

on:
  workflow_dispatch:

jobs:
  sticker_test:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: sudo apt-get install -y jq

      - name: Send Initial Stickers and Emojis (حجز الوقت)
        id: send_phase
        run: |
          TOKEN="${{ secrets.Token }}"
          CHAT_ID="${{ secrets.Id }}"
          
          # 1. إرسال إيموجي متحرك عادي (مثلاً إيموجي الساعة لحجز الوقت)
          RES_EMOJI=$(curl -s -X POST "https://api.telegram.org/bot${TOKEN}/sendMessage" \
            -d "chat_id=${CHAT_ID}" \
            -d "text=⏳")
          echo "EMOJI_ID=$(echo $RES_EMOJI | jq '.result.message_id')" >> $GITHUB_ENV
          
          # 2. إرسال ستيكر رسمي من تليجرام (استخدام File ID لستيكر شهير)
          # سنرسل ستيكر عادي كمثال (إذا كان لديك معرف ستيكر خاص يمكنك تبديله)
          RES_STK=$(curl -s -X POST "https://api.telegram.org/bot${TOKEN}/sendSticker" \
            -d "chat_id=${CHAT_ID}" \
            -d "sticker=CAACAgIAAxkBAAEExwVkh...") # معرف ستيكر تجريبي
          echo "STK_ID=$(echo $RES_STK | jq '.result.message_id')" >> $GITHUB_ENV

      - name: Freezing Time (الانتظار دقيقتين)
        run: sleep 120

      - name: Modify Content (محاولة التعديل المخفي)
        run: |
          TOKEN="${{ secrets.Token }}"
          CHAT_ID="${{ secrets.Id }}"
          
          # محاولة تعديل نص الإيموجي إلى نص الأسئلة
          curl -s -X POST "https://api.telegram.org/bot${TOKEN}/editMessageText" \
            -d "chat_id=${CHAT_ID}" \
            -d "message_id=${{ env.EMOJI_ID }}" \
            -d "text=أهلاً.. هذه هي الأسئلة المسربة بعد الإيموجي!"

          # محاولة تعديل الستيكر واستبداله بنص أو ميديا أخرى
          curl -s -X POST "https://api.telegram.org/bot${TOKEN}/editMessageCaption" \
            -d "chat_id=${CHAT_ID}" \
            -d "message_id=${{ env.STK_ID }}" \
            -d "caption=الأسئلة المسربة الحقيقية!"
