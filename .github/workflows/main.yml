name: Telegram US Timezone Cheat Test

on:
  [workflow_dispatch,push] # تشغيل يدوي بضغطة زر

jobs:
  timezone_experiment:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Python Environment
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Telethon & Pytz
        run: pip install telethon pytz

      - name: Download Tiny Test Images
        run: |
          curl -s -o us_1.jpg "https://placehold.co/150x150/0000ff/ffffff.jpg?text=USA1"
          curl -s -o us_2.jpg "https://placehold.co/150x150/0000ff/ffffff.jpg?text=USA2"

      - name: Create and Run US Timezone Script
        env:
          TELEGRAM_API_ID: ${{ secrets.ID }}
          TELEGRAM_API_HASH: ${{ secrets.HASH }}
          TELEGRAM_SESSION: ${{ secrets.SESSION }}
        run: |
          cat << 'EOF' > us_script.py
          import asyncio
          import os
          import datetime
          import pytz
          from telethon import TelegramClient
          from telethon.sessions import StringSession

          api_id = int(os.environ['TELEGRAM_API_ID'])
          api_hash = os.environ['TELEGRAM_API_HASH']
          session_string = os.environ['TELEGRAM_SESSION']
          chat_id = -1004457565242 # معرف مجموعتك

          async def main():
              client = TelegramClient(StringSession(session_string), api_id, api_hash)
              await client.connect()
              
              # جلب وقت أمريكا الحالي (نيويورك) المتأخر بـ 7 ساعات عن توقيتنا
              us_tz = pytz.timezone('America/New_York')
              us_time = datetime.datetime.now(us_tz)
              
              print(f"=== [1] محاولة الإرسال بتوقيت أمريكا المحلي المتأخر: {us_time} ===")
              
              # إرسال الألبوم مع محاولة فرض الوقت الأمريكي المتأخر في الجدولة
              await client.send_file(
                  chat_id, 
                  ['us_1.jpg', 'us_2.jpg'], 
                  caption="تجربة خداع بلد البوت (توقيت أمريكا): هل رجع الزمن؟",
                  schedule=us_time
              )
              
              print("تم إرسال الألبوم بنظام التوقيت الأمريكي!")
              await client.disconnect()

          if __name__ == '__main__':
              asyncio.run(main())
          EOF
          
          python us_script.py
