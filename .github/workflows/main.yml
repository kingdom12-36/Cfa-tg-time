name: Telegram Scheduled Message Test

on:
  [workflow_dispatch,push] # تشغيل يدوي بضغطة زر

jobs:
  scheduled_experiment:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Python Environment
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Telethon Library
        run: pip install telethon

      - name: Download Tiny Test Images
        run: |
          curl -s -o test_1.jpg "https://placehold.co/150x150/000000/000000.jpg"
          curl -s -o test_2.jpg "https://placehold.co/150x150/ffffff/ffffff.jpg"

      - name: Create and Run Scheduled Script
        env:
          TELEGRAM_API_ID: ${{ secrets.ID }}
          TELEGRAM_API_HASH: ${{ secrets.HASH }}
          TELEGRAM_SESSION: ${{ secrets.SESSION }}
        run: |
          cat << 'EOF' > scheduled_script.py
          import asyncio
          import os
          import datetime
          from telethon import TelegramClient
          from telethon.sessions import StringSession

          api_id = int(os.environ['TELEGRAM_API_ID'])
          api_hash = os.environ['TELEGRAM_API_HASH']
          session_string = os.environ['TELEGRAM_SESSION']
          chat_id = -1004457565242 # معرف مجموعتك

          async def main():
              client = TelegramClient(StringSession(session_string), api_id, api_hash)
              await client.connect()
              
              # حساب الوقت الحالي + دقيقتين للجدولة
              # تليجرام بيحتاج التوقيت بصيغة UTC لجدولة الرسائل بالسيرفر
              scheduled_time = datetime.datetime.utcnow() + datetime.timedelta(minutes=2)
              
              print(f"=== [1] جاري إرسال الألبوم كرسالة مجدولة لتظهر عند: {scheduled_time} UTC ===")
              
              # إرسال الألبوم مع بارامتر schedule لتتم الجدولة بالسيرفر
              await client.send_file(
                  chat_id, 
                  ['test_1.jpg', 'test_2.jpg'], 
                  caption="تجربة الجدولة: هل تم خداع الوقت؟",
                  schedule=scheduled_time
              )
              
              print("تمت جدولة الرسالة بنجاح في سيرفرات تليجرام!")
              await client.disconnect()

          if __name__ == '__main__':
              asyncio.run(main())
          EOF
          
          python scheduled_script.py
